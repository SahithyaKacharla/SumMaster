<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

    <div class="bg-white p-6 rounded-2xl shadow-lg text-center w-[350px]">
        
        <h1 class="text-2xl font-bold mb-2">MathSprint 🚀</h1>
        
        <div class="flex justify-between mb-4">
            <p>⏱ Time: <span id="timer">30</span>s</p>
            <p>🏆 Score: <span id="score">0</span></p>
        </div>

        <h2 class="text-xl mb-4">
            <span id="firstNumber"></span> +
            <span id="secondNumber"></span> =
        </h2>

        <input id="userInput" type="number"
            class="border-2 p-2 rounded w-full text-center mb-4"
            placeholder="Enter answer" />

        <button onclick="checkResult()"
            class="bg-blue-500 text-white px-4 py-2 rounded mr-2">
            Check
        </button>

        <button onclick="restartGame()"
            class="bg-gray-500 text-white px-4 py-2 rounded">
            Restart
        </button>

        <p id="gameResult" class="mt-4 font-bold"></p>

    </div>

    <script src="SumMaster.js"></script>
</body>
</html>
